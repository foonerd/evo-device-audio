[plugin]
name = "org.evoframework.system.power"
# Keep in sync with this crate's Cargo.toml [package].version (PluginIdentity + packaging).
version = "0.1.0"
contract = 1

[target]
shelf = "system.power"
shape = 1

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "in-process"
exec = "<compiled-in>"

[trust]
class = "platform"

[prerequisites]
# Framework provides the per-verb capability gate this plugin's
# verb_capabilities declarations require; pinned to the current
# framework version so admission against an older steward (where
# the gate substrate is absent) refuses cleanly rather than
# admitting and silently leaving the verbs un-gated.
evo_min_version = "0.1.12"
os_family = "linux"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 8
max_cpu_percent = 1

[lifecycle]
# Reactive-only: no state machine, no background work. Operator gestures
# (reboot_device / power_off_device) flow through the respondent surface;
# the verb shells out to systemctl and returns. No teardown / re-admit
# cycle is needed.
mode = "reactive-only"
autostart = true
restart_on_crash = true
restart_budget = 5

[capabilities.respondent]
request_types = ["reboot_device", "power_off_device"]
response_budget_ms = 5000

[capabilities.respondent.verb_capabilities]
# Both verbs are step-up gated against the system_admin scope. The framework
# dispatcher consults this map BEFORE forwarding the request to the plugin's
# handle_request; a principal without the scope or without an active step-up
# session refuses at the dispatch boundary with `permission_denied` and the
# plugin never sees the call.
reboot_device = { kind = "step_up", scope = "system_admin" }
power_off_device = { kind = "step_up", scope = "system_admin" }
