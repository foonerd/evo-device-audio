# ALSA card-name → operator-friendly label catalog.
#
# Static reference data. Maps the raw `aplay -l` card name to a
# human-readable label, the type hint (i2s vs integrated; richer
# classes — HDMI / Analog / SPDIF / USB / Bluetooth — are derived
# at runtime from the label + name keywords), and the per-card
# default ALSA mixer control. Multi-device cards (one card with
# multiple subdevices, e.g. HDMI with multiple outputs) carry a
# `devices` array with per-subdevice labels.
#
# The data here is a verbatim port of the predecessor JSON-shape
# catalog the audio platform shipped, normalised to TOML and to
# snake_case field names. Adding rows for new ALSA card names is
# a framework-release change; this file is shipped-only (no
# operator-supplied rows; custom hardware integration goes
# through the hardware.audio-config modder workflow, separate
# concern).
#
# Schema version: 1.

schema_version = 1

