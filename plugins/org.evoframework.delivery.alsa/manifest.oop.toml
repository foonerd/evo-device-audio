[plugin]
name = "org.evoframework.delivery.alsa"
# Keep in sync with this crate's Cargo.toml [package].version (PluginIdentity + packaging).
version = "0.1.0"
contract = 1

[target]
shelf = "audio.delivery"
shape = 2

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "out-of-process"
exec = "plugin.bin"

[trust]
class = "standard"

[prerequisites]
evo_min_version = "0.1.12"
os_family = "linux"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 32
max_cpu_percent = 5

[lifecycle]
# Reactive-only: the plugin's load-time work establishes the
# modular ALSA pipeline + spawns the options-subject observer.
# Operator changes flow through the options subject (publisher:
# playback.options); the delivery plugin's observer task picks
# up state diffs and re-renders the pipeline in place. No
# teardown + re-admit cycle is needed on operator config changes.
mode = "reactive-only"
autostart = true
restart_on_crash = true
restart_budget = 5

# Capability flags. `subscribe_subjects = true` populates
# LoadContext.subject_state_subscriber so the plugin can observe
# operator changes to the playback.options settings subject and
# emit a `delivery.options_observed` happening on every update.
# The full asound.conf re-rendering response to settings changes
# (pcm.evo rewriting based on mixer_type / output_device / etc.)
# is the next phase of the delivery-side reactivity work; the
# observer wiring lands here so the cross-plugin reactivity
# contract is operator-verifiable rather than emit-into-the-void.
[capabilities]
subscribe_subjects = true

# Respondent capabilities. Operator-facing introspection of the
# modular ALSA pipeline state: which cards / mixers / formats the host
# supports right now. The settings layer (playback.options) drives
# this plugin via the same surface to bind a chosen output device.
[capabilities.respondent]
request_types = [
    "delivery.probe_hardware",
    "delivery.list_cards",
    "delivery.list_mixers",
    "delivery.active_endpoint",
]
response_budget_ms = 5000

# Audio data plane: delivery stage. This plugin owns the
# modular ALSA pipeline (`pcm.evo` defined in
# /etc/asound.conf) and declares it as the WriteEndpoint other
# audio-producing plugins write into. The framework's
# reconciliation engine intersects this plugin's declared
# `audio_formats` with each source plugin's declared formats to
# negotiate a chain-wide format on every topology rewire.
#
# `device = "alsa:evo"` names the ALSA pcm the framework
# publishes to source / composition plugins' WriteEndpoints.
# Format-negotiation uses the enumerated `audio_formats` below as
# the format set this plugin's hardware accepts; runtime hardware
# probing (alsa_hw_params via libasound) lands as an enhancement
# once the production substrate stabilises.
#
# `exclusive_mode = false` and `bit_perfect_capable = false` keep
# the reference posture conservative: the pcm.evo chain
# uses ALSA's `plug` plugin (automatic format conversion), so the
# delivery stage is NOT bit-perfect on its own — the source must
# produce a format the chain's terminus accepts, with `plug`
# bridging any mismatch. Bit-perfect topologies require pinning
# pcm.evo to a direct `hw:` slave and matching format exactly;
# that posture is a later improvement for the playback.options-driven
# config arc.
[capabilities.delivery]
input_kind = "audio.pcm"
device = "alsa:evo"
exclusive_mode = false
bit_perfect_capable = false

# Standard PCM bit-depths + rate ladder the I-Sabre Q2M DAC
# accepts (and most contemporary DACs accept). The enumerated
# list is the floor; runtime `alsa_hw_params` probing on a
# specific host narrows it to the active card's actual range.
# Vendor distributions targeting a fixed-format DAC trim this
# list to match their hardware.
[[capabilities.delivery.audio_formats]]
kind = "pcm"
codec = "pcm_s16_le"
rate_hz = [44100, 48000, 88200, 96000, 176400, 192000]
channels = 2

[[capabilities.delivery.audio_formats]]
kind = "pcm"
codec = "pcm_s24_le"
rate_hz = [44100, 48000, 88200, 96000, 176400, 192000]
channels = 2

[[capabilities.delivery.audio_formats]]
kind = "pcm"
codec = "pcm_s32_le"
rate_hz = [44100, 48000, 88200, 96000, 176400, 192000]
channels = 2
