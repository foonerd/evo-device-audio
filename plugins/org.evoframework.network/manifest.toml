[plugin]
name = "org.evoframework.network"
version = "0.1.0"
contract = 1

[target]
shelf = "networking.link"
shape = 1

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "in-process"
exec = "<compiled-in>"

[trust]
class = "standard"

[prerequisites]
evo_min_version = "0.1.11-rc.1"
os_family = "linux"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 64
max_cpu_percent = 10

[lifecycle]
# Reload-cleanable: operator-tunable state covers
# NetworkManager binding + supervisor preset + connectivity-
# check policy. A TOML edit triggers teardown + re-admit; the
# plugin's source supervisor (rtnetlink / nmcli) drops its
# subscriptions on teardown and re-establishes them with the
# new configuration on re-admit.
mode = "reload-cleanable"
autostart = true
restart_on_crash = true
restart_budget = 5

[capabilities.respondent]
request_types = [
    "network.nm.status",
    "network.nm.scan",
    "network.nm.intent.get",
    "network.nm.intent.set",
    "network.nm.intent.apply",
    "network.nm.captive.status",
    "network.nm.captive.start",
    "network.nm.captive.submit",
    "network.nm.captive.complete",
    "network.nm.security.status",
    "network.nm.security.harden",
    "network.nm.flight_mode.get",
    "network.nm.flight_mode.set",
    "network.nm.radio.status",
    "network.nm.radio.set",
    "network.nm.supervisor.status",
    "network.nm.wifi_devices",
    "network.refresh_connectivity",
]
response_budget_ms = 15000

# Per-verb capability gate declarations. The framework dispatcher
# consults this map BEFORE forwarding the request to the plugin's
# handle_request; a principal that does not satisfy the declared
# scope refuses at the dispatch boundary with `permission_denied`
# and the plugin never sees the call. Read-only verbs (status /
# get / list-devices / supervisor.status / refresh_connectivity)
# remain unmapped and default to anonymous-OK per the framework's
# backwards-compatible default. Write-class verbs (intent.set /
# captive.*) record operator intent or submit credentials; they
# gate at write:network_admin. Apply-class verbs (intent.apply /
# security.harden / flight_mode.set / radio.set / scan) reconfigure
# the host's network state, change radio posture, or initiate
# active probes; they gate at step_up:network_admin so the operator
# must hold an active step-up auth session for the change to
# proceed. The narrow nmcli + iw + rfkill sudoers grants remain in
# place as the OS-layer enforcement; the framework gate is the
# first line of defence, the sudoers grant is the last.
[capabilities.respondent.verb_capabilities]
"network.nm.intent.set" = { kind = "write", scope = "network_admin" }
"network.nm.captive.start" = { kind = "write", scope = "network_admin" }
"network.nm.captive.submit" = { kind = "write", scope = "network_admin" }
"network.nm.captive.complete" = { kind = "write", scope = "network_admin" }
"network.nm.intent.apply" = { kind = "step_up", scope = "network_admin" }
"network.nm.security.harden" = { kind = "step_up", scope = "network_admin" }
"network.nm.flight_mode.set" = { kind = "step_up", scope = "network_admin" }
"network.nm.radio.set" = { kind = "step_up", scope = "network_admin" }
"network.nm.scan" = { kind = "step_up", scope = "network_admin" }
