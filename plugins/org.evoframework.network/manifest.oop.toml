[plugin]
name = "org.evoframework.network"
version = "0.1.0"
contract = 1

[target]
shelf = "networking.link"
shape = 1

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "out-of-process"
exec = "plugin.bin"

[trust]
class = "standard"

[prerequisites]
evo_min_version = "0.1.11-rc.1"
os_family = "linux"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 64
max_cpu_percent = 10

[lifecycle]
# The framework's reload runtime checks `mode` to decide
# which path to take on operator-gestured reload. `mode`
# defaults to `Frozen` (refuses reload) when not declared.
# The supervisor's multi-source ingest + adaptive_tick +
# probe URL configuration are operator-tunable; reload
# requires a clean teardown of the rtnetlink / NM / polling
# sources and re-admit at the new configuration, so we
# declare `reload-cleanable`. The legacy
# `hot_reload = "restart"` field previously carried alone
# is now removed — `mode` is the canonical surface.
mode = "reload-cleanable"
autostart = true
restart_on_crash = true
restart_budget = 5

[capabilities.respondent]
request_types = [
    "network.nm.status",
    "network.nm.scan",
    "network.nm.intent.get",
    "network.nm.intent.set",
    "network.nm.intent.apply",
    "network.nm.captive.status",
    "network.nm.captive.start",
    "network.nm.captive.submit",
    "network.nm.captive.complete",
    "network.nm.security.status",
    "network.nm.security.harden",
    "network.nm.flight_mode.get",
    "network.nm.flight_mode.set",
    "network.nm.radio.status",
    "network.nm.radio.set",
    "network.nm.supervisor.status",
    "network.nm.wifi_devices",
    "network.refresh_connectivity",
]
response_budget_ms = 15000
