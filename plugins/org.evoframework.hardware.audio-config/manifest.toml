[plugin]
name = "org.evoframework.hardware.audio-config"
# Keep in sync with this crate's Cargo.toml [package].version (PluginIdentity + packaging).
version = "0.1.0"
contract = 1

[target]
shelf = "hardware.audio"
shape = 1

[kind]
instance = "singleton"
interaction = "respondent"

[transport]
type = "in-process"
exec = "<compiled-in>"

[trust]
class = "standard"

[prerequisites]
evo_min_version = "0.1.12"
os_family = "linux"
outbound_network = false
filesystem_scopes = []

[resources]
max_memory_mb = 24
max_cpu_percent = 2

[lifecycle]
# Reactive-only: the plugin publishes the
# evo.hardware.audio:capabilities + :active_config + :pending_reboot
# subjects at admission. Operator gestures (select_dac /
# clear_dac) flow through the respondent surface, write the boot
# config's dtoverlay block, then emit the
# `hardware.audio.reboot_required` happening + refresh the
# subject state. No teardown + re-admit cycle is needed.
mode = "reactive-only"
autostart = true
restart_on_crash = true
restart_budget = 5

# Capability flags. The plugin both announces subjects (the
# operator-visible catalogue + active-config + reboot-required
# panes) and serves respondent verbs (catalogue read +
# selection + clear + read-active).
[capabilities]
announce_subjects = true

# Respondent capabilities. Operator-facing audio-hardware
# control surface. `list_dac_catalogue` returns the catalogue
# filtered by the resolved board profile (e.g. Raspberry PI on
# a Pi 5; an empty list with a structured "no catalogue for this
# board class" diagnostic on a NUC). `select_dac` /
# `clear_dac` write the boot-config dtoverlay block and signal
# reboot-required. `current_config` returns the on-disk active
# configuration (overlay + alsacard hint + mixer hint).
# `confirm_reboot_required` is the operator-facing read of the
# reboot-required pane.
[capabilities.respondent]
request_types = [
    "hardware.audio.list_dac_catalogue",
    "hardware.audio.select_dac",
    "hardware.audio.clear_dac",
    "hardware.audio.current_config",
    "hardware.audio.confirm_reboot_required",
    "hardware.audio.verify_install",
    "hardware.audio.dsp.list_controls",
    "hardware.audio.dsp.get_control",
    "hardware.audio.dsp.set_control",
    "hardware.audio.modder.list_overlays",
    "hardware.audio.modder.register_overlay",
    "hardware.audio.modder.remove_overlay",
]
response_budget_ms = 3000

# Per-verb capability gate declarations. The framework
# dispatcher consults this map BEFORE forwarding the request to
# the plugin's handle_request; a principal that does not satisfy
# the declared scope refuses with `permission_denied` at the
# dispatch boundary. Read-only verbs (`list_dac_catalogue`,
# `current_config`, `confirm_reboot_required`, `verify_install`,
# `dsp.list_controls`, `dsp.get_control`, `modder.list_overlays`)
# remain unmapped and default to anonymous-OK per the framework's
# backwards-compatible default. The mutating verbs all gate on
# `step_up:audio_admin` — the operator must hold an active step-up
# auth session on the audio_admin scope before any DAC selection,
# overlay register, or DSP mutation reaches the plugin. The OS-
# layer enforcement (the sudoers Cmnd_Aliases `EVO_HARDWARE_AUDIO_*`
# + the `hardware-audio-privileges.conf` systemd drop-in widening
# `ReadWritePaths`) continues to be the LAST line of defence; the
# framework's per-verb capability gate is the FIRST.
[capabilities.respondent.verb_capabilities]
"hardware.audio.select_dac" = { kind = "step_up", scope = "audio_admin" }
"hardware.audio.clear_dac" = { kind = "step_up", scope = "audio_admin" }
"hardware.audio.dsp.set_control" = { kind = "step_up", scope = "audio_admin" }
"hardware.audio.modder.register_overlay" = { kind = "step_up", scope = "audio_admin" }
"hardware.audio.modder.remove_overlay" = { kind = "step_up", scope = "audio_admin" }
