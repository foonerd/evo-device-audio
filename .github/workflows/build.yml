# PR and branch push: host-side fmt, clippy, tests. SDK arrives via
# git tag in [workspace.dependencies]; no sibling evo-core checkout
# needed.
#
# Scope: main branch + PRs targeting main. Development branches
# (e.g. v0.1.X feature branches) may pin the SDK via a path
# dependency on a sibling private evo-core-eng clone for
# dev-velocity reasons; those branches do not auto-trigger CI
# here because the sibling is not available on the runner. At
# release-cut, the dev branch's SDK pin flips back to a
# git+tag form and the merge to main validates here cleanly.
name: build

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    # Schemas-repo foot-lock (R-009): every shipped plugin
    # manifest must declare a `[target].shelf` + `[target].shape`
    # pair backed by a schema file in the canonical
    # `foonerd/evo-catalogue-schemas` repository. The preflight
    # script reads the schemas-repo checkout via the
    # EVO_CATALOGUE_SCHEMAS_DIR env var.
    runs-on: ubuntu-latest
    steps:
      - name: Check out evo-device-audio
        uses: actions/checkout@v5
        with:
          path: evo-device-audio
      - name: Check out evo-catalogue-schemas
        uses: actions/checkout@v5
        with:
          repository: foonerd/evo-catalogue-schemas
          path: evo-catalogue-schemas
      - name: Schemas-repo foot-lock alignment (R-009)
        working-directory: evo-device-audio
        env:
          EVO_CATALOGUE_SCHEMAS_DIR: ${{ github.workspace }}/evo-catalogue-schemas
        run: scripts/preflight/check-catalogue-schemas-alignment.sh

  test:
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
