# cross (https://github.com/cross-rs/cross) configuration for
# evo-device-audio.
#
# This file shapes how `cross build` runs: per-target image
# overrides and pre-build scripts. During pre-release development
# the workspace's `evo-plugin-sdk` pin resolves through a sibling
# path-dep on the framework's working tree; the volume mount
# needed to expose that workspace root inside the container is
# supplied via the `CROSS_CONTAINER_OPTS` environment variable
# rather than this file's `volumes` field — see
# `scripts/cross-build.sh` and `DEVELOPING.md` for the canonical
# invocation.
#
# Two reasons this config exists beyond a placeholder:
#
# 1. Path-dep workspace-root visibility. `cross` auto-discovers
#    path-dep crate directories and mounts each leaf into the
#    container at the host-canonical path, but it does NOT mount
#    the path-dep's workspace root. The SDK pin uses
#    `edition.workspace = true`, so cargo must walk up from the
#    SDK crate to its workspace root to resolve the inheritance.
#    The `CROSS_CONTAINER_OPTS` workaround mounts that workspace
#    root explicitly. At release cut the SDK pin flips back to a
#    `git = ..., tag = ...` form against the published framework
#    release and this workaround is no longer needed.
#
# 2. libasound2 cross-target dependency. The composition.alsa
#    plugin's optional `alsa-substrate` Cargo feature pulls in
#    the `alsa` crate (libasound bindings). Cross-builds for
#    aarch64-unknown-linux-gnu therefore need libasound2-dev
#    for the arm64 architecture inside the container. The
#    pre-build script installs it on every fresh container
#    start. Other targets that do not enable `alsa-substrate`
#    are unaffected.

[build.env]
volumes = ["EVO_CORE_ENG"]

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update",
    "apt-get install --assume-yes libasound2-dev pkg-config",
]

[target.x86_64-unknown-linux-gnu.env]
volumes = ["EVO_CORE_ENG"]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes libasound2-dev:$CROSS_DEB_ARCH pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
volumes = ["EVO_CORE_ENG"]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes libasound2-dev:$CROSS_DEB_ARCH pkg-config",
]

[target.armv7-unknown-linux-gnueabihf.env]
volumes = ["EVO_CORE_ENG"]
